<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form>
		<div>
			<label>Name</label>
			<input type="text" placeholder="Name" id="name" required>
		</div>
		<div>
			<label>Email</label>
			<input type="email" placeholder="Email" id="email" required>
		</div>
		<div>
			<label>Gender</label>
			<input id = "gender_m" name="gender" type="radio" required>
			<label>Male</label>
			<input id="gender_f" name="gender" type="radio" required>
			<label>Female</label>
		</div>
		<div>
			<label>Car Brands</label>
			<select id="cars" required>
				<option selected>--Please choose an option</option>
				<option>BMW</option>
				<option>Nano</option>
			</select>
		</div>
		<div>
			<label>Age</label>
			<input type="number" id="age" placeholder="Age" required>
		</div>
		<div>
			<label>DOB</label>
			<input type="date" id="dob" required>
		</div>
		<div>
			<label>Phone Number</label>
			<input type="tel" id="tel" placeholder="xxx-xxx-xxxx">
		</div>
		<div>
			<label>Password</label>
			<input type="password" id="password" placeholder="Password" required>
		</div>
		<div>
			<input type="checkbox" id="tos" required>
			<label>I agree to the TOS</label>
		</div>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
